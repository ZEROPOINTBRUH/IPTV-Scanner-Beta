<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream not found — {{ slug }} | {{ site_name }}</title>
    <meta name="description" content="No IPTV lineup entry matched this channel URL slug. Browse the guide for available streams.">
    <meta name="robots" content="noindex,follow">
    <link rel="canonical" href="{{ canonical }}">
    <meta name="theme-color" content="#050812">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, "Segoe UI", sans-serif;
            background: radial-gradient(600px 300px at 50% -5%, rgba(240,82,112,.09), transparent 60%), linear-gradient(180deg, #090c14 0%, #05060c 60%);
            color: #dfe4f5;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        .box {
            max-width: 460px;
            padding: 32px;
            border-radius: 18px;
            border: 1px solid rgba(230,235,245,.08);
            background: rgba(16,22,42,.82);
            box-shadow: 0 26px 64px rgba(0,0,0,.52);
        }
        h1 { margin: 0 0 12px; font-size: 1.55rem; color: #f48fb1; }
        p { color: #aab1c9; margin: 0 0 18px; line-height: 1.55; }
        code {
            font-size: 14px;
            background: rgba(0,0,0,.38);
            padding: 8px 12px;
            border-radius: 10px;
            display: inline-block;
            margin: 12px 0;
            letter-spacing: 0.03em;
        }
        a {
            display: inline-block;
            margin-top: 10px;
            padding: 12px 22px;
            border-radius: 12px;
            background: linear-gradient(180deg, #4aa8ff 0%, #2d87e6 100%);
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
        }
        a.secondary { margin-top: 12px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); }
    </style>
</head>
<body>
    <div class="box">
        <h1>{{ error_title }}</h1>
        <p>{{ error_body }}</p>
        <div><code>/{{ slug }}</code></div>
        <p style="margin-top:8px;font-size:13px">Slugs mirror channel names after a scan. New channels take a minute to appear.</p>
        <a href="{{ canonical }}">{{ site_name }} home</a><br>
        <a class="secondary" href="{{ home_url }}/sitemap.xml" style="color:#cfe4ff;font-weight:600">View sitemap</a>
    </div>
</body>
</html>
